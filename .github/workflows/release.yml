name: release

# Every push to `main` refreshes a single rolling "latest" GitHub Release,
# rebuilding and re-attaching a prebuilt binary (+ sha256 checksum) for each
# target below. Users can then download from:
#   https://github.com/axos88/claude-status/releases/latest/download/<asset>
# without needing a Rust toolchain.

on:
  push:
    branches: [main, master]
  workflow_dispatch: # allow manual re-runs from the Actions tab

permissions:
  contents: write # create the release / move the tag / upload assets

# Only one release run at a time — a newer push supersedes an in-flight one,
# so they can't race on the delete-and-recreate of the `latest` release.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Recreate the `latest` release+tag at the current commit so its assets
      # are always the freshest build and stale ones don't linger.
      - name: Refresh the rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
          gh release create latest \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Latest build" \
            --notes "Rolling build of the latest commit on main ($GITHUB_SHA)." \
            --latest

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — glibc (most common) and a fully static musl build
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          # Linux ARM64 — servers, Raspberry Pi, etc.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # macOS — Apple Silicon and Intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds with the size-optimized release profile (see Cargo.toml — it does
      # NOT strip the symbol table, so panic backtraces stay readable),
      # auto-using `cross` for the Linux cross targets, then archives the binary
      # (.tar.gz on unix, .zip on windows) and uploads it to the `latest`
      # release created above.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: claude-status
          target: ${{ matrix.target }}
          checksum: sha256
          locked: true
          ref: refs/tags/latest
          token: ${{ secrets.GITHUB_TOKEN }}
